version: 0.2

phases:
  pre_build:
    commands:
      - echo "Installing dependencies..."
      - npm ci
  build:
    commands:
      - echo "Build completed - no compile step for Node.js"
  post_build:
    commands:
      - echo "Creating deployment package..."
      - zip -r deploy-archive.zip . -x "*.git*" -x "*.env" -x "node_modules/*"

artifacts:
  files:
    - deploy-archive.zip
  name: BuildOutput

cache:
  paths:
    - node_modules/**/*
