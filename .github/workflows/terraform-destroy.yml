name: Terraform Destroy

on:
  workflow_dispatch:

env:
  TF_VAR_aws_region: us-east-1
  TF_VAR_project_name: wellspan-demo
  TF_VAR_instance_type: t3.micro

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TF_VAR_aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          BUCKET=$(echo -n "${{ secrets.TF_STATE_BUCKET }}" | tr -d '[:space:]')
          {
            echo "bucket = \"$BUCKET\""
            echo "key = \"wellspan-demo/terraform.tfstate\""
            echo "region = \"${{ env.TF_VAR_aws_region }}\""
          } > backend.hcl
          terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -var="key_name=${{ secrets.AWS_KEY_PAIR_NAME }}" -auto-approve -input=false
