AWSTemplateFormatVersion: "2010-09-09"
Description: "Simple EC2 web server - Cordea-Weespan Mentorship Program welcome page"

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access (create one in EC2 Console if needed)

Resources:
  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic for web server
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP

  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}"
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          cat > /var/www/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Cordea-Weespan Mentorship Program</title>
            <style>
              body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #eee; }
              h1 { font-size: 2.5rem; text-align: center; }
            </style>
          </head>
          <body>
            <h1>Welcome to Cordea-Weespan Mentorship Program</h1>
          </body>
          </html>
          EOF
          systemctl start httpd
          systemctl enable httpd

Outputs:
  WebURL:
    Description: Open this URL in your browser to see the welcome page
    Value: !Sub "http://${WebServer.PublicIp}"
    Export:
      Name: !Sub "${AWS::StackName}-WebURL"
  PublicIP:
    Description: EC2 Public IP address
    Value: !GetAtt WebServer.PublicIp
    Export:
      Name: !Sub "${AWS::StackName}-PublicIP"
